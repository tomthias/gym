<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>Weekly Climbing Schedule - Mattia</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/weekly.css">
</head>
<body>
    <header>
        <h1>Weekly Schedule</h1>
        <div class="subtitle">Piano Settimanale Arrampicata</div>
    </header>

    <!-- Resume workout banner (hidden by default, shown by JS if there's an active workout) -->
    <div id="resumeWorkoutBanner" class="resume-workout-banner" style="display: none;">
        <div class="resume-info">
            <div class="resume-title">Sessione in corso</div>
            <div id="resumeDetails" class="resume-details"></div>
        </div>
        <div class="resume-actions">
            <button id="btnResumeWorkout" class="btn-resume">RIPRENDI</button>
            <button id="btnCancelWorkout" class="btn-cancel" aria-label="Chiudi">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Weekly Statistics -->
    <div class="weekly-stats-container">
        <h2>Progressi Settimanali</h2>
        <div id="weeklyStats" class="weekly-stats">
            <!-- Renderizzato da JS -->
            <div class="stat-item">
                <span class="stat-label">Sessioni Completate:</span>
                <span class="stat-value">0/9</span>
            </div>
            <div class="stat-progress">
                <div class="stat-progress-bar" style="width: 0%"></div>
            </div>
            <div class="stat-percentage">0%</div>
        </div>
    </div>

    <!-- Weekly Schedule List -->
    <div class="weekly-container">
        <div id="weeklyListContainer" class="weekly-list">
            <!-- Renderizzato dinamicamente da JS -->
            <!-- Qui verranno inserite le 7 giornate con le sessioni -->
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions-container">
        <button class="btn-reset-progress btn-secondary" aria-label="Reset progressi">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polyline points="1 4 1 10 7 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Reset Progressi</span>
        </button>
        <button class="btn-refresh btn-secondary" aria-label="Aggiorna">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polyline points="23 4 23 10 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="1 20 1 14 7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Aggiorna</span>
        </button>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/index.html" class="nav-item active" aria-label="Home">
            <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="nav-label">Home</span>
        </a>
        <a href="/pages/history.html" class="nav-item" aria-label="Storico">
            <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="18" y1="20" x2="18" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="20" x2="12" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="6" y1="20" x2="6" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="nav-label">Storico</span>
        </a>
        <a href="/pages/nutrition.html" class="nav-item" aria-label="Nutrizione">
            <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="nav-label">Nutrizione</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script type="module" src="js/pages/home.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registrato con successo:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('Registrazione ServiceWorker fallita:', error);
                    });
            });
        }
    </script>
</body>
</html>
