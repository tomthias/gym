<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <title>Weekly Climbing Schedule - Mattia</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/weekly.css">
</head>
<body>
    <header>
        <h1>🧗 Weekly Schedule</h1>
        <div class="subtitle">Piano Settimanale Arrampicata</div>
    </header>

    <!-- Resume workout banner (hidden by default, shown by JS if there's an active workout) -->
    <div id="resumeWorkoutBanner" class="resume-workout-banner" style="display: none;">
        <div class="resume-info">
            <div class="resume-title">Sessione in corso</div>
            <div id="resumeDetails" class="resume-details"></div>
        </div>
        <div class="resume-actions">
            <button id="btnResumeWorkout" class="btn-resume">RIPRENDI</button>
            <button id="btnCancelWorkout" class="btn-cancel">✕</button>
        </div>
    </div>

    <!-- Weekly Statistics -->
    <div class="weekly-stats-container">
        <h2>📊 Progressi Settimanali</h2>
        <div id="weeklyStats" class="weekly-stats">
            <!-- Renderizzato da JS -->
            <div class="stat-item">
                <span class="stat-label">Sessioni Completate:</span>
                <span class="stat-value">0/9</span>
            </div>
            <div class="stat-progress">
                <div class="stat-progress-bar" style="width: 0%"></div>
            </div>
            <div class="stat-percentage">0%</div>
        </div>
    </div>

    <!-- Weekly Schedule List -->
    <div class="weekly-container">
        <div id="weeklyListContainer" class="weekly-list">
            <!-- Renderizzato dinamicamente da JS -->
            <!-- Qui verranno inserite le 7 giornate con le sessioni -->
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions-container">
        <button class="btn-reset-progress btn-secondary">
            🔄 Reset Progressi
        </button>
        <button class="btn-refresh btn-secondary">
            ↻ Aggiorna
        </button>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="pages/history.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Storico</span>
        </a>
        <a href="pages/nutrition.html" class="nav-item">
            <span class="nav-icon">🍎</span>
            <span class="nav-label">Nutrizione</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script type="module" src="js/pages/home.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registrato con successo:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('Registrazione ServiceWorker fallita:', error);
                    });
            });
        }
    </script>
</body>
</html>
